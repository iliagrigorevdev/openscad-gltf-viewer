<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenSCAD GLTF Viewer</title>

    <!-- Primary Meta Tags -->
    <meta
      name="description"
      content="A modern, web-based editor and 3D viewer for OpenSCAD supporting WebAssembly compilation, PBR materials, and GPU Path Tracing."
    />
    <meta name="theme-color" content="#222222" />

    <!-- Icons -->
    <link rel="icon" type="image/png" href="./icon.png" />
    <link rel="apple-touch-icon" href="./icon.png" />

    <link rel="manifest" href="./manifest.webmanifest" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta
      property="og:url"
      content="https://iliagrigorevdev.github.io/openscad-gltf-viewer/"
    />
    <meta property="og:title" content="OpenSCAD GLTF Viewer" />
    <meta
      property="og:description"
      content="A modern, web-based editor and 3D viewer for OpenSCAD supporting WebAssembly compilation, PBR materials, and GPU Path Tracing."
    />
    <meta
      property="og:image"
      content="https://iliagrigorevdev.github.io/openscad-gltf-viewer/icon.png"
    />

    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div id="app-container">
      <!-- Left / Top Half: Controls -->
      <div id="left-panel">
        <div class="panel-section">
          <h2>1. AI Prompt Generator</h2>
          <p class="help-text">
            Describe the object you want to generate. The copied prompt will
            include advanced PBR and Animation rules based on your selection.
          </p>
          <div id="prompt-options" class="toggles">
            <label
              ><input type="checkbox" id="opt-pbr-basic" checked /> Basic
              PBR</label
            >
            <label
              ><input type="checkbox" id="opt-pbr-transmission" checked />
              Transmission</label
            >
            <label
              ><input type="checkbox" id="opt-pbr-clearcoat" checked />
              Clearcoat</label
            >
            <label
              ><input type="checkbox" id="opt-pbr-sheen" checked /> Sheen</label
            >
            <label
              ><input type="checkbox" id="opt-pbr-emissive" checked />
              Emissive</label
            >
            <label
              ><input type="checkbox" id="opt-pbr-specular" checked />
              Specular</label
            >
            <label
              ><input type="checkbox" id="opt-pbr-iridescence" checked />
              Iridescence</label
            >
            <label
              ><input type="checkbox" id="opt-anim" checked /> Animations</label
            >
          </div>
          <textarea
            id="prompt-desc"
            rows="2"
            placeholder="e.g. A shiny gold ring with an embedded red gem"
          ></textarea>
          <button id="copy-prompt-btn">📋 Copy Prompt to Clipboard</button>
        </div>

        <div class="panel-section flex-grow">
          <h2>2. SCAD Editor</h2>
          <textarea id="editor" spellcheck="false"></textarea>

          <div class="controls-row">
            <button id="render-btn" class="primary">▶ Render</button>
            <button id="load-scad-btn">📁 Load</button>
            <button id="download-scad-btn">⬇ SCAD</button>
            <button id="export-gltf-btn">⬇ GLTF</button>
            <button id="capture-image-btn">📷 Image</button>
            <button id="share-btn">🔗 Share</button>
          </div>
          <div class="controls-row toggles">
            <label>
              <input type="checkbox" id="auto-render-cb" checked /> Auto
              Render</label
            >
            <label
              ><input type="checkbox" id="auto-smooth-cb" checked /> Auto
              Smooth</label
            >
            <label title="Crease Angle (degrees)">
              <input
                type="number"
                id="crease-angle-in"
                value="30"
                min="0"
                max="180"
              />°
            </label>
            <label
              ><input type="checkbox" id="path-tracing-cb" /> Path
              Tracing</label
            ><label
              ><input type="checkbox" id="export-binary-cb" checked /> Binary
              GLTF</label
            ><label
              ><input type="checkbox" id="export-compression-cb" /> Compress
              GLTF</label
            >
          </div>
        </div>

        <div class="panel-section">
          <h2>3. SCAD Serve Backend</h2>
          <div class="controls-row">
            <input
              type="text"
              id="backend-url"
              value="http://localhost:3000"
              placeholder="http://localhost:3000"
            />
            <button id="backend-connect-btn">Connect</button>
          </div>
          <div id="backend-ui">
            <select id="backend-select">
              <option value="">-- Create New Model --</option>
            </select>
            <div class="controls-row backend-row">
              <input
                type="text"
                id="backend-input"
                placeholder="Input Name (e.g. model)"
              />
              <input
                type="text"
                id="backend-output"
                placeholder="Output (optional)"
              />
            </div>

            <!-- Explicit Config Parameters for scad-build -->
            <div class="controls-row backend-row toggles">
              <label
                ><input type="checkbox" id="backend-binary-cb" checked />
                Binary</label
              >
              <label
                ><input type="checkbox" id="backend-smooth-cb" checked /> Auto
                Smooth</label
              >
              <label title="Crease Angle"
                ><input
                  type="number"
                  id="backend-crease-in"
                  value="30"
                  min="0"
                  max="180"
                />°</label
              >
              <label
                ><input type="checkbox" id="backend-compress-cb" />
                Compress</label
              >
              <label title="Resize (Absolute Dimension in units)"
                >Resize:
                <input
                  type="number"
                  id="backend-resize-in"
                  placeholder="None"
                  min="0"
                  step="0.1"
                  style="width: 60px"
                />
              </label>
            </div>

            <div class="controls-row">
              <button id="backend-save-btn" class="primary">
                Save SCAD + Config
              </button>
              <button id="backend-update-btn">Update Config Only</button>
              <button id="backend-load-btn">Load SCAD</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Right / Bottom Half: Viewer -->
      <div id="right-panel">
        <div id="status">Waiting for code...</div>
        <div id="viewer"></div>
      </div>
    </div>

    <!-- Drag and Drop Overlay -->
    <div id="drag-overlay">Drop .scad file here</div>

    <script type="module" src="./main.js"></script>
  </body>
</html>
